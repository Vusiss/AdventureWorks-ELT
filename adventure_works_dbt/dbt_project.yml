
name: 'adventure_project'
version: '1.0.0'

profile: 'adventure_project'

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

clean-targets:
  - "target"
  - "dbt_packages"

# Workflow:
#   1. python prepare_duckdb_extract.py   <- copies aw-db.Extract to aw-olap.duckdb
#   2. dbt run                            <- builds staging + star schema in aw-olap.duckdb
#   3. dbt test                           <- validates completeness and correctness

models:
  adventure_project:
    example:
      +enabled: false
    staging:
      +materialized: table
      +schema: staging
    marts:
      +materialized: table
      +schema: main
