
name: 'adventure_project'
version: '1.0.0'

profile: 'adventure_project'

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

clean-targets:
  - "target"
  - "dbt_packages"

# Workflow:
#   1. python data_extract.py    <- loads AdventureWorks2014 → aw-db.extract (DLT)
#   2. python exchange_rates.py  <- loads NBP USD/PLN rates → aw-db.extract
#   3. dbt run                   <- builds staging + star schema in aw-db
#   4. dbt test                  <- validates completeness and correctness

models:
  adventure_project:
    example:
      +enabled: false
    staging:
      +materialized: table
      +schema: staging
    marts:
      +materialized: table
      +schema: main
