version: 2

models:
  - name: dim_product
    description: >
      Product dimension. One row per product. Includes category/subcategory
      hierarchy, pricing tiers (DISCRETEPRICE), lifecycle status (ACTIVE/INACTIVE),
      PROFIT, MARGIN, SOLDFOR, and aggregated customer ratings from the external CSV.
    columns:
      - name: product_key
        description: Surrogate key (= ProductID from AdventureWorks)
        tests:
          - unique
          - not_null
      - name: product_id
        tests:
          - unique
          - not_null
      - name: product_name
        tests:
          - not_null
      - name: list_price
        tests:
          - not_null
      - name: profit
        tests:
          - not_null
      - name: margin_pct
        tests:
          - not_null
      - name: active
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['ACTIVE', 'INACTIVE']
      - name: discrete_price
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['LOW', 'MEDIUM', 'HIGH', 'VERY HIGH', 'N/A']
      - name: sold_for_months
        tests:
          - not_null

  - name: dim_salesperson
    description: >
      Salesperson dimension. One row per salesperson. Full name from Person.Person.
      Includes denormalised territory info (name, country, group) for direct analysis
      without joining dim_territory.
    columns:
      - name: salesperson_key
        description: Surrogate key (= BusinessEntityID)
        tests:
          - unique
          - not_null
      - name: salesperson_id
        tests:
          - unique
          - not_null
      - name: full_name
        tests:
          - not_null
      - name: territory_name
        tests:
          - not_null
      - name: country_name
        tests:
          - not_null
      - name: territory_group
        tests:
          - not_null
      - name: commission_pct
        tests:
          - not_null

  - name: dim_territory
    description: >
      Sales territory dimension. One row per territory.
      Country name joined from Person.CountryRegion.
    columns:
      - name: territory_key
        description: Surrogate key (= TerritoryID)
        tests:
          - unique
          - not_null
      - name: territory_id
        tests:
          - unique
          - not_null
      - name: territory_name
        tests:
          - not_null
      - name: country_name
        tests:
          - not_null
      - name: territory_group
        tests:
          - not_null

  - name: dim_date
    description: >
      Date dimension covering the actual sales date range (oldest to newest order).
      Built from stg_date. Attributes: day, month (number + name), quarter,
      half_year (1=H1 Jan-Jun, 2=H2 Jul-Dec), year, day_of_week, week_of_year,
      is_weekend.
    columns:
      - name: date_key
        description: Surrogate key in YYYYMMDD integer format
        tests:
          - unique
          - not_null
      - name: full_date
        tests:
          - unique
          - not_null
      - name: year
        tests:
          - not_null
      - name: half_year
        description: Semester — 1 (Jan-Jun) or 2 (Jul-Dec)
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: [1, 2]
      - name: quarter
        tests:
          - not_null
      - name: month
        tests:
          - not_null
      - name: month_name
        tests:
          - not_null
      - name: day_of_month
        tests:
          - not_null
      - name: is_weekend
        tests:
          - not_null

  - name: fact_sales
    description: >
      Sales fact table. Grain = one row per order line (SalesOrderDetail).
      Only shipped orders (status = 5). Includes PLN amount via NBP USD/PLN
      exchange rate (LOCF for weekends/holidays) and rate direction flag.
      Web orders (no salesperson) use salesperson_key = -1.
    columns:
      - name: sales_fact_key
        description: Surrogate key (= SalesOrderDetailID)
        tests:
          - unique
          - not_null
      - name: order_date_key
        description: FK to dim_date.date_key
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_date')
                field: date_key
      - name: product_key
        description: FK to dim_product.product_key
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_product')
                field: product_key
      - name: territory_key
        description: FK to dim_territory.territory_key
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_territory')
                field: territory_key
      - name: order_qty
        tests:
          - not_null
      - name: unit_price
        tests:
          - not_null
      - name: line_total
        tests:
          - not_null
      - name: line_total_pln
        description: Line revenue in PLN (line_total × NBP USD/PLN rate on order date)
        tests:
          - not_null
      - name: usd_pln_rate
        description: NBP USD/PLN exchange rate used for PLN conversion
        tests:
          - not_null
      - name: rate_change_direction
        description: Whether the exchange rate rose or fell vs previous published rate
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['INCREASE', 'DECREASE', 'STABLE', 'UNKNOWN']
